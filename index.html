<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Baby Planner</title>
<link rel="icon" type="image/png" href="./icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F0E8;--card:#fff;--text:#2c2218;--muted:#8a7e70;--accent:#D97B3B;--green:#5E9E5E;--blue:#4A8CB5;--purple:#A85BA5;--gold:#C49A2A;--check:#8CC084;--border:#ece5db;--red:#c0392b}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;min-height:100dvh;background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:80px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:10px 0 8px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);transition:all 0.2s;border:none;background:none;font-family:'DM Sans',system-ui}
.tab.active{color:var(--accent)}
.tab-icon{font-size:22px;display:block;margin-bottom:2px}
.page{display:none;padding:24px 16px 20px}.page.active{display:block}
.wrap{max-width:620px;margin:0 auto}
.hdr{text-align:center;margin-bottom:24px}
.hdr h1{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:700;line-height:1.15;margin:8px 0 4px;letter-spacing:-0.3px}
.hdr p{color:var(--muted);font-size:13px;font-weight:500}
.crd{background:var(--card);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 2px 16px rgba(60,40,20,0.05)}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-lbl{font-weight:600;font-size:14px}
.prog-pct{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:700;color:var(--accent)}
.track{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:6px}
.fill{height:100%;border-radius:99px;transition:width 0.4s ease;width:0%}
.fill-a{background:linear-gradient(90deg,var(--accent),var(--purple))}
.fill-g{background:linear-gradient(90deg,var(--green),var(--blue))}
.dash{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.dash-card{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 1px 10px rgba(60,40,20,0.04);text-align:center}
.dash-val{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700;margin-bottom:2px}
.dash-lbl{font-size:11px;color:var(--muted);font-weight:500}
.btn{border:none;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',system-ui;color:#fff;transition:all 0.3s}
.btn-accent{background:var(--accent);box-shadow:0 3px 12px rgba(217,123,59,0.3)}
.btn-ghost{background:none;border:1px solid #d5ccc0;color:#9a8e80;padding:10px 16px;font-size:13px}
.btn-ghost:hover{background:#f5efe6}
.btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.status{font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;display:inline-block;margin-left:8px}
.status-ok{background:#e8f5e0;color:#3a7a2a}
.dirty-msg{font-size:12px;color:var(--accent);margin-top:10px;font-weight:600;display:none}
.tl{position:relative}.tll{position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--accent),var(--gold),var(--green),var(--blue),var(--purple));border-radius:99px;z-index:0}
.ph{position:relative;padding-left:42px;margin-bottom:12px}
.dot{position:absolute;left:8px;top:16px;width:16px;height:16px;border-radius:50%;z-index:1;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700}
.cd{background:var(--card);border-radius:12px;box-shadow:0 1px 8px rgba(60,40,20,0.05);overflow:hidden;border-left:3px solid transparent}
.cd.ad{border-left-color:var(--check)!important}
.ch-btn{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',system-ui}
.ch-icon{font-size:22px}.ch-title{font-weight:600;font-size:14px;color:var(--text)}
.ch-meta{display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap}
.badge{font-size:10px;color:#fff;padding:2px 8px;border-radius:99px;font-weight:700}
.ch-count{font-size:11px;color:#9a8e80;font-weight:500}
.chev{color:#bab0a2;font-size:16px;transition:transform 0.25s}.chev.open{transform:rotate(180deg)}
.items{padding:0 16px 14px;display:none}.items.open{display:block}
.item{display:flex;align-items:flex-start;gap:11px;padding:9px 0;cursor:pointer;user-select:none}
.item+.item{border-top:1px solid #f0ebe4}
.cb{width:20px;height:20px;min-width:20px;border-radius:6px;border:2px solid #cdc2b6;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:#fff}
.cb.c{border-color:var(--check);background:#e6f4e0}
.cb.c::after{content:"✓";color:#4a8a3e;font-size:13px;font-weight:700}
.ix{font-size:13px;line-height:1.45;transition:all 0.2s}.ix.c{color:#b8ae9e;text-decoration:line-through}
.bcat{margin-bottom:16px}
.bcat-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;background:var(--card);border-radius:12px;box-shadow:0 1px 8px rgba(60,40,20,0.05)}
.bcat-icon{font-size:20px}.bcat-title{font-weight:600;font-size:14px;flex:1}
.bcat-sum{font-size:12px;color:var(--muted);font-weight:500}
.bcat-items{display:none;background:var(--card);border-radius:0 0 12px 12px;padding:0 16px 12px;margin-top:-4px;box-shadow:0 1px 8px rgba(60,40,20,0.05)}
.bcat-items.open{display:block}
.bi{padding:12px 0;display:flex;flex-direction:column;gap:8px}.bi+.bi{border-top:1px solid #f0ebe4}
.bi-top{display:flex;align-items:center;gap:10px}
.bi-name{flex:1;font-size:13px;font-weight:500}
.bi-bought{width:20px;height:20px;min-width:20px;border-radius:6px;border:2px solid #cdc2b6;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;background:#fff}
.bi-bought.c{border-color:var(--check);background:#e6f4e0}
.bi-bought.c::after{content:"✓";color:#4a8a3e;font-size:12px;font-weight:700}
.bi-prices{display:flex;gap:8px;align-items:center}
.bi-field{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted)}
.bi-field label{font-size:11px;white-space:nowrap}
.bi-input{width:72px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:'DM Sans',system-ui;text-align:right;background:#faf7f3;color:var(--text)}
.bi-input:focus{outline:none;border-color:var(--accent);background:#fff}
.bi-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:4px}.bi-del:hover{color:var(--red)}

/* Link section */
.bi-link-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.bi-link-input{flex:1;min-width:0;padding:5px 8px;border:1px solid var(–border);border-radius:6px;font-size:12px;font-family:‘DM Sans’,system-ui;background:#faf7f3;color:var(–text)}
.bi-link-input:focus{outline:none;border-color:var(–accent);background:#fff}
.bi-link-fetch{background:var(–blue);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:‘DM Sans’,system-ui}
.bi-link-fetch:disabled{background:#ccc;cursor:wait}
.bi-link-open{background:none;border:1px solid var(–border);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;text-decoration:none;color:var(–blue);font-weight:600;white-space:nowrap}
.bi-link-open:hover{background:#f0f7fb}
.bi-product{background:#f8f5f0;border-radius:8px;padding:10px 12px;margin-top:4px}
.bi-product-name{font-size:12px;font-weight:600;color:var(–text);margin-bottom:3px}
.bi-product-desc{font-size:11px;color:var(–muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.bi-product-use{background:var(–accent);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;margin-top:6px;font-weight:600;font-family:‘DM Sans’,system-ui}
.bi-fetching{font-size:11px;color:var(–blue);padding:6px 0}

.add-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.add-input{flex:1;min-width:100px;padding:8px 12px;border:1px solid var(–border);border-radius:8px;font-size:13px;font-family:‘DM Sans’,system-ui;background:#faf7f3}
.add-input:focus{outline:none;border-color:var(–accent);background:#fff}
.add-price{width:70px;padding:8px;border:1px solid var(–border);border-radius:8px;font-size:13px;font-family:‘DM Sans’,system-ui;text-align:right;background:#faf7f3}
.add-price:focus{outline:none;border-color:var(–accent);background:#fff}
.add-btn{background:var(–accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:18px;cursor:pointer;font-weight:700;line-height:1}

.ft{text-align:center;font-size:12px;color:#b0a494;margin-top:18px;font-weight:500}
@media(min-width:768px){.dash{grid-template-columns:repeat(4,1fr)}.bi-prices{gap:14px}}
@media(max-width:380px){.dash-val{font-size:18px}.bi-prices{flex-wrap:wrap}}
</style>

</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showPage('checklist')" id="tab-checklist"><span class="tab-icon">✅</span>Checklist</button>
  <button class="tab" onclick="showPage('budget')" id="tab-budget"><span class="tab-icon">💰</span>Budget</button>
</div>

<!-- CHECKLIST -->

<div class="page active" id="page-checklist">
<div class="wrap">
  <div class="hdr"><div style="font-size:44px;line-height:1">👶🏼</div><h1>Checklist<br>Tweede Kindje</h1><p>Gesorteerd op tijdlijn met deadlines</p></div>
  <div class="crd">
    <div class="prog-top"><div><span class="prog-lbl" id="cl-lbl">0 van 0</span><span id="cl-st"></span></div><span class="prog-pct" id="cl-pct">0%</span></div>
    <div class="track"><div class="fill fill-a" id="cl-fill"></div></div>
    <div class="btn-row" style="margin-top:14px"><button class="btn btn-ghost" id="cl-sv" onclick="clSave()">✓ Opgeslagen</button><button class="btn btn-ghost" onclick="clReset()">Reset</button></div>
    <p class="dirty-msg" id="cl-dirty">Je hebt onopgeslagen wijzigingen</p>
  </div>
  <div class="tl" id="tl"><div class="tll"></div></div>
</div>
</div>

<!-- BUDGET -->

<div class="page" id="page-budget">
<div class="wrap">
  <div class="hdr"><div style="font-size:44px;line-height:1">💰</div><h1>Budget<br>Babyplanner</h1><p>Houd je uitgaven bij — prijzen voor België</p></div>
  <div class="dash" id="bu-dash"></div>
  <div class="crd" style="margin-bottom:20px">
    <div class="prog-top"><span class="prog-lbl">Gekocht</span><span class="prog-pct" id="bu-pct" style="color:var(--green)">0%</span></div>
    <div class="track"><div class="fill fill-g" id="bu-fill"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:8px">
      <span style="font-size:12px;color:var(--muted)">Besteed: <strong id="bu-spent">€0</strong></span>
      <span style="font-size:12px;color:var(--muted)">Budget: <strong id="bu-budget">€0</strong></span>
    </div>
    <div class="btn-row" style="margin-top:14px"><button class="btn btn-ghost" id="bu-sv" onclick="buSave()">✓ Opgeslagen</button><button class="btn btn-ghost" onclick="buReset()">Reset</button></div>
    <p class="dirty-msg" id="bu-dirty">Je hebt onopgeslagen wijzigingen</p>
  </div>
  <div id="bu-cats"></div>
</div>
</div>

<script>
// ===== TABS =====
function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

// ===== CHECKLIST =====
var CL=[
  {t:"Eerste Trimester",i:"🌱",d:"Vóór week 13",c:"#D97B3B",x:["Zwangerschap melden bij verloskundige/gynaecoloog","Zorgverzekering controleren (dekking bevalling, kraamzorg)","NIPT of combinatietest overwegen en inplannen","Budget opstellen voor extra kosten tweede kind","Kinderopvang aanmelden voor tweede kind (wachtlijsten!)","Eerste kind voorbereiden op komst broertje/zusje","Boekjes over grote broer/zus worden lezen"]},
  {t:"Tweede Trimester",i:"🌿",d:"Vóór week 27",c:"#C49A2A",x:["Kraamzorg aanvragen (liefst vóór week 16!)","20-weken echo inplannen","Zwangerschap melden bij werkgever","Zwangerschapsverlof aanvragen","Partner: geboorteverlof regelen","Keuze ziekenhuis of thuisbevalling bespreken","Kinderopvangtoeslag berekenen en voorbereiden","Testament/voogdijregeling bijwerken","Spaarpotje/rekening openen voor tweede kind","Inventarisatie: wat kan hergebruikt worden?","Geboortekaartjes ontwerpen/bestellen"]},
  {t:"Derde Trimester",i:"🪺",d:"Vóór week 34",c:"#5E9E5E",x:["Geboorteplan opstellen","Overdracht werkzaamheden voorbereiden","Ouderschapsverlof aanvragen","Bevallingsverlof controleren via werkgever","Aanvullende verzekering baby controleren","Babykamer/slaaphoek inrichten","Wieg of co-sleeper klaarzetten","Autostoeltje groep 0+ controleren","Kinderwagen/buggy checken of aanschaffen","Groot bed voor eerste kind regelen","Oppas/logeerplan eerste kind regelen","Kinderopvang regelen tijdens bevalling"]},
  {t:"Bijna Zover!",i:"🎒",d:"Vóór week 37",c:"#4A8CB5",x:["Kraampakket bestellen","Ziekenhuistas inpakken","Babykleding sorteren op maat","Luiers, doekjes, verzorgingsproducten inslaan","Borstvoeding/flesvoeding benodigdheden","Aankleedkussen en badspullen checken","Route naar ziekenhuis doorspreken","Noodplan: wie past op eerste kind?","Bellijst/appgroep aanmaken","Beschuit met muisjes inkopen","Traktatie regelen voor kraamvisite","Cadeautje van de baby voor grote broer/zus"]},
  {t:"Na de Geboorte",i:"✨",d:"Eerste weken",c:"#A85BA5",x:["Geboorteaangifte bij gemeente (binnen 3 werkdagen!)","Baby inschrijven bij zorgverzekeraar (binnen 4 maanden)","Baby aanmelden bij huisarts","Consultatiebureau: eerste afspraak inplannen","BSN-nummer ontvangen en bewaren","Geboortekaartjes versturen","Kinderbijslag controleren"]}
];
var clK="b2c",clCk={},clOpen=null,clDr=false;
CL.forEach(function(p,a){p.x.forEach(function(_,b){clCk[a+"x"+b]=false})});
try{var s=localStorage.getItem(clK);if(s)s.split(",").forEach(function(k){if(k in clCk)clCk[k]=true})}catch(e){}
function clSave(){try{var v=[];for(var k in clCk)if(clCk[k])v.push(k);localStorage.setItem(clK,v.join(","));clDr=false;clUI()}catch(e){}}
function clReset(){if(!confirm("Alle vinkjes resetten?"))return;for(var k in clCk)clCk[k]=false;clDr=false;try{localStorage.removeItem(clK)}catch(e){}clUI()}
function clTi(a,b){clCk[a+"x"+b]=!clCk[a+"x"+b];clDr=true;clUI()}
function clTc(a){clOpen=clOpen===a?null:a;clUI()}
function clUI(){
  var tot=0,dn=0;for(var k in clCk){tot++;if(clCk[k])dn++}var pct=Math.round((dn/tot)*100);
  document.getElementById("cl-lbl").textContent=dn+" van "+tot+" taken";
  document.getElementById("cl-pct").textContent=pct+"%";
  document.getElementById("cl-fill").style.width=pct+"%";
  var btn=document.getElementById("cl-sv");
  if(clDr){btn.className="btn btn-accent";btn.textContent="💾 Opslaan"}else{btn.className="btn btn-ghost";btn.textContent="✓ Opgeslagen"}
  document.getElementById("cl-dirty").style.display=clDr?"block":"none";
  var tl=document.getElementById("tl"),h='<div class="tll"></div>';
  CL.forEach(function(ph,pi){var cd=0;ph.x.forEach(function(_,ii){if(clCk[pi+"x"+ii])cd++});var ad=cd===ph.x.length,op=clOpen===pi,dc=ad?"#8CC084":ph.c;
    h+='<div class="ph"><div class="dot" style="background:'+dc+';box-shadow:0 0 0 3px #fff,0 0 0 5px '+dc+'40">'+(ad?"✓":"")+'</div><div class="cd'+(ad?" ad":"")+'" style="border-left-color:'+(ad?"#8CC084":ph.c)+'">';
    h+='<button class="ch-btn" onclick="clTc('+pi+')"><span class="ch-icon">'+ph.i+'</span><div style="flex:1"><div class="ch-title">'+ph.t+'</div><div class="ch-meta"><span class="badge" style="background:'+(ad?"#8CC084":ph.c)+'">'+ph.d+'</span><span class="ch-count">'+cd+'/'+ph.x.length+(ad?" ✅":"")+'</span></div></div><span class="chev'+(op?" open":"")+'">▾</span></button>';
    h+='<div class="items'+(op?" open":"")+'">';ph.x.forEach(function(txt,ii){var done=clCk[pi+"x"+ii];h+='<div class="item" onclick="clTi('+pi+','+ii+')"><div class="cb'+(done?" c":"")+'"></div><span class="ix'+(done?" c":"")+'">'+txt+'</span></div>'});
    h+='</div></div></div>'});
  tl.innerHTML=h;
}

  {cat:"Kleding",icon:"👕",items:[

    {name:"Kledingkast baby",budget:180,paid:0,bought:false,url:"",pName:"",pDesc:""},
    {name:"Nachtlampje",budget:20,paid:0,bought:false,url:"",pName:"",pDesc:""},
    {name:"Decoratie & mobiel",budget:35,paid:0,bought:false,url:"",pName:"",pDesc:""}]},
  {cat:"Geboorte",icon:"🎉",items:[
    {name:"Geboortekaartjes",budget:80,paid:0,bought:false,url:"",pName:"",pDesc:""},
    {name:"Kraampakket",budget:30,paid:0,bought:false,url:"",pName:"",pDesc:""},
    {name:"Beschuit met muisjes",budget:10,paid:0,bought:false,url:"",pName:"",pDesc:""},
    {name:"Traktatie kraamvisite",budget:40,paid:0,bought:false,url:"",pName:"",pDesc:""},
    {name:"Cadeau van baby voor grote zus",budget:25,paid:0,bought:false,url:"",pName:"",pDesc:""}]}
];

var buK="b2b",buD=[],buOpen=null,buDr=false;
function buLoad(){try{var s=localStorage.getItem(buK);if(s){buD=JSON.parse(s);buD.forEach(function(c){c.items.forEach(function(it){if(!it.url)it.url="";if(!it.pName)it.pName="";if(!it.pDesc)it.pDesc=""})});return}}catch(e){}buD=JSON.parse(JSON.stringify(BU_DEF))}
buLoad();

function buSave(){try{localStorage.setItem(buK,JSON.stringify(buD));buDr=false;buUI()}catch(e){}}
function buReset(){if(!confirm("Budget resetten naar standaard?"))return;buD=JSON.parse(JSON.stringify(BU_DEF));buDr=false;try{localStorage.removeItem(buK)}catch(e){}buUI()}
function buToggle(ci,ii){buD[ci].items[ii].bought=!buD[ci].items[ii].bought;buDr=true;buUI()}
function buCat(ci){buOpen=buOpen===ci?null:ci;buUI()}
function buDel(ci,ii){buD[ci].items.splice(ii,1);buDr=true;buUI()}
function buPrice(ci,ii,f,v){buD[ci].items[ii][f]=parseFloat(v)||0;buDr=true;buDash();document.getElementById("bu-sv").className="btn btn-accent";document.getElementById("bu-sv").textContent="💾 Opslaan";document.getElementById("bu-dirty").style.display="block"}
function buUrl(ci,ii,v){buD[ci].items[ii].url=v;buDr=true}
function buAdd(ci){var nm=document.getElementById("an-"+ci),pr=document.getElementById("ap-"+ci);if(!nm||!nm.value.trim())return;buD[ci].items.push({name:nm.value.trim(),budget:parseFloat(pr.value)||0,paid:0,bought:false,url:"",pName:"",pDesc:""});nm.value="";pr.value="";buDr=true;buUI()}

// Fetch product info from URL
function buFetch(ci,ii){
  var it=buD[ci].items[ii];
  var url=it.url.trim();
  if(!url)return;
  if(!/^https?:\/\//i.test(url))url="https://"+url;
  it.url=url;

  var el=document.getElementById("fetch-status-"+ci+"-"+ii);
  if(el)el.innerHTML='<span class="bi-fetching">⏳ Ophalen...</span>';

  var proxy="https://api.allorigins.win/get?url="+encodeURIComponent(url);
  fetch(proxy).then(function(r){return r.json()}).then(function(data){
    if(!data.contents){throw new Error("Geen inhoud")}
    var html=data.contents;
    var title="",desc="";

    // Try og:title
    var m=html.match(/<meta[^>]*property=["']og:title["'][^>]*content=["']([^"']+)["']/i);
    if(!m)m=html.match(/<meta[^>]*content=["']([^"']+)["'][^>]*property=["']og:title["']/i);
    if(m)title=m[1];

    // Fallback to <title>
    if(!title){m=html.match(/<title[^>]*>([^<]+)<\/title>/i);if(m)title=m[1]}

    // Try og:description
    m=html.match(/<meta[^>]*property=["']og:description["'][^>]*content=["']([^"']+)["']/i);
    if(!m)m=html.match(/<meta[^>]*content=["']([^"']+)["'][^>]*property=["']og:description["']/i);
    if(m)desc=m[1];

    // Fallback meta description
    if(!desc){m=html.match(/<meta[^>]*name=["']description["'][^>]*content=["']([^"']+)["']/i);if(m)desc=m[1]}

    // Decode HTML entities
    var tmp=document.createElement("textarea");
    if(title){tmp.innerHTML=title;title=tmp.value}
    if(desc){tmp.innerHTML=desc;desc=tmp.value}

    it.pName=title||"";
    it.pDesc=desc||"";
    buDr=true;
    buUI();
  }).catch(function(e){
    if(el)el.innerHTML='<span style="font-size:11px;color:var(--red)">Kon niet ophalen — link is wel opgeslagen</span>';
    buDr=true;
  });
}

// Use fetched product name as item name
function buUseName(ci,ii){
  var it=buD[ci].items[ii];
  if(it.pName){it.name=it.pName;buDr=true;buUI()}
}

function buDash(){
  var tB=0,tP=0,tI=0,bI=0;
  buD.forEach(function(c){c.items.forEach(function(it){tI++;tB+=it.budget;tP+=it.paid;if(it.bought)bI++})});
  var pct=tI?Math.round((bI/tI)*100):0,diff=tB-tP,dC=diff>=0?"var(--green)":"var(--red)";
  document.getElementById("bu-pct").textContent=pct+"%";
  document.getElementById("bu-fill").style.width=pct+"%";
  document.getElementById("bu-spent").textContent="€"+tP.toFixed(0);
  document.getElementById("bu-budget").textContent="€"+tB.toFixed(0);
  document.getElementById("bu-dash").innerHTML=
    '<div class="dash-card"><div class="dash-val" style="color:var(--accent)">€'+tB.toFixed(0)+'</div><div class="dash-lbl">Totaal budget</div></div>'+
    '<div class="dash-card"><div class="dash-val" style="color:var(--green)">€'+tP.toFixed(0)+'</div><div class="dash-lbl">Besteed</div></div>'+
    '<div class="dash-card"><div class="dash-val" style="color:'+dC+'">€'+Math.abs(diff).toFixed(0)+(diff<0?' over':'')+'</div><div class="dash-lbl">'+(diff>=0?'Resterend':'Over budget')+'</div></div>'+
    '<div class="dash-card"><div class="dash-val" style="color:var(--blue)">'+bI+'/'+tI+'</div><div class="dash-lbl">Gekocht</div></div>';
}

function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}

function buUI(){
  buDash();
  var btn=document.getElementById("bu-sv");
  if(buDr){btn.className="btn btn-accent";btn.textContent="💾 Opslaan"}else{btn.className="btn btn-ghost";btn.textContent="✓ Opgeslagen"}
  document.getElementById("bu-dirty").style.display=buDr?"block":"none";

  var el=document.getElementById("bu-cats"),h="";
  buD.forEach(function(cat,ci){
    var op=buOpen===ci,cB=0,cP=0,cBo=0;
    cat.items.forEach(function(it){cB+=it.budget;cP+=it.paid;if(it.bought)cBo++});
    h+='<div class="bcat"><div class="bcat-head" onclick="buCat('+ci+')"><span class="bcat-icon">'+cat.icon+'</span><span class="bcat-title">'+esc(cat.cat)+'</span><span class="bcat-sum">€'+cP.toFixed(0)+' / €'+cB.toFixed(0)+'</span><span class="chev'+(op?' open':'')+'">▾</span></div>';
    h+='<div class="bcat-items'+(op?' open':'')+'">';
    cat.items.forEach(function(it,ii){
      var hasProduct=it.pName||it.pDesc;
      h+='<div class="bi">';
      // Top row: checkbox + name + delete
      h+='<div class="bi-top"><div class="bi-bought'+(it.bought?' c':'')+'" onclick="buToggle('+ci+','+ii+')"></div><span class="bi-name'+(it.bought?' ix c':'')+'">'+esc(it.name)+'</span><button class="bi-del" onclick="buDel('+ci+','+ii+')" title="Verwijder">✕</button></div>';
      // Prices
      h+='<div class="bi-prices"><div class="bi-field"><label>Budget</label><input class="bi-input" type="number" value="'+it.budget+'" onchange="buPrice('+ci+','+ii+',\'budget\',this.value)" onclick="this.select()"></div>';
      h+='<div class="bi-field"><label>Betaald</label><input class="bi-input" type="number" value="'+it.paid+'" onchange="buPrice('+ci+','+ii+',\'paid\',this.value)" onclick="this.select()" style="border-color:'+(it.paid>0?'var(--green)':'var(--border)')+'"></div></div>';
      // Link row
      h+='<div class="bi-link-row"><input class="bi-link-input" placeholder="🔗 Plak hier de productlink..." value="'+esc(it.url)+'" onchange="buUrl('+ci+','+ii+',this.value)" id="url-'+ci+'-'+ii+'">';
      h+='<button class="bi-link-fetch" onclick="buFetch('+ci+','+ii+')">Ophalen</button>';
      if(it.url){h+='<a class="bi-link-open" href="'+esc(it.url)+'" target="_blank" rel="noopener">Bekijk ↗</a>'}
      h+='</div>';
      // Fetch status / product info
      h+='<div id="fetch-status-'+ci+'-'+ii+'">';
      if(hasProduct){
        h+='<div class="bi-product">';
        if(it.pName)h+='<div class="bi-product-name">'+esc(it.pName)+'</div>';
        if(it.pDesc)h+='<div class="bi-product-desc">'+esc(it.pDesc)+'</div>';
        if(it.pName&&it.pName!==it.name)h+='<button class="bi-product-use" onclick="buUseName('+ci+','+ii+')">Gebruik als itemnaam</button>';
        h+='</div>';
      }
      h+='</div>';
      h+='</div>';
    });
    // Add new item
    h+='<div class="add-row"><input class="add-input" id="an-'+ci+'" placeholder="Nieuw item..." onkeydown="if(event.key===\'Enter\')buAdd('+ci+')"><input class="add-price" id="ap-'+ci+'" type="number" placeholder="€"><button class="add-btn" onclick="buAdd('+ci+')" title="Toevoegen">+</button></div>';
    h+='</div></div>';
  });
  el.innerHTML=h;
}

// Init
clUI();buUI();
</script>
