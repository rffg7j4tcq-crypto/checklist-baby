<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Checklist Tweede Kindje</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F0E8;--card:#fff;--text:#2c2218;--muted:#8a7e70;--accent:#D97B3B;--green:#5E9E5E;--blue:#4A8CB5;--purple:#A85BA5;--gold:#C49A2A;--check:#8CC084;--border:#ece5db}*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text);padding:28px 16px 60px;-webkit-font-smoothing:antialiased}.wrap{max-width:580px;margin:0 auto}.header{text-align:center;margin-bottom:28px}.header .big-icon{font-size:48px;line-height:1}.header h1{font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:700;line-height:1.15;margin:10px 0 6px;letter-spacing:-0.3px}.header .sub{color:var(--muted);font-size:13px;font-weight:500}.pc{background:var(--card);border-radius:16px;padding:20px 22px;margin-bottom:28px;box-shadow:0 2px 20px rgba(60,40,20,0.06)}.pt{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.pl{font-weight:600;font-size:14px}.pp{font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:700;color:var(--accent)}.tr{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:18px}.fi{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width 0.4s ease;width:0%}.br{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.sb{border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',system-ui;color:#fff;transition:all 0.3s}.sb.a{background:var(--accent);box-shadow:0 4px 14px rgba(217,123,59,0.35)}.sb.s{background:#c4b8aa}.rb{background:none;border:1px solid #d5ccc0;border-radius:10px;padding:11px 18px;color:#9a8e80;font-size:13px;cursor:pointer;font-family:'DM Sans',system-ui}.rb:hover{background:#f5efe6}.stb{font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;display:inline-block;margin-left:10px}.stb.ok{background:#e8f5e0;color:#3a7a2a}.stb.er{background:#fde8e8;color:#c0392b}.dh{font-size:12px;color:var(--accent);margin-top:10px;font-weight:600;display:none}.tl{position:relative}.tll{position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--accent),var(--gold),var(--green),var(--blue),var(--purple));border-radius:99px;z-index:0}.ph{position:relative;padding-left:42px;margin-bottom:12px}.dot{position:absolute;left:8px;top:16px;width:16px;height:16px;border-radius:50%;z-index:1;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700}.cd{background:var(--card);border-radius:12px;box-shadow:0 1px 8px rgba(60,40,20,0.05);overflow:hidden;border-left:3px solid transparent}.cd.ad{border-left-color:var(--check)!important}.ch{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',system-ui}.ci{font-size:22px}.ct{font-weight:600;font-size:14px;color:var(--text)}.cm{display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap}.ba{font-size:10px;color:#fff;padding:2px 8px;border-radius:99px;font-weight:700;letter-spacing:0.2px}.cc{font-size:11px;color:#9a8e80;font-weight:500}.cv{color:#bab0a2;font-size:16px;transition:transform 0.25s}.cv.o{transform:rotate(180deg)}.its{padding:0 16px 14px;display:none}.its.o{display:block}.it{display:flex;align-items:flex-start;gap:11px;padding:9px 0;cursor:pointer;user-select:none}.it+.it{border-top:1px solid #f0ebe4}.cb{width:20px;height:20px;min-width:20px;border-radius:6px;border:2px solid #cdc2b6;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:#fff}.cb.c{border-color:var(--check);background:#e6f4e0}.cb.c::after{content:"✓";color:#4a8a3e;font-size:13px;font-weight:700}.ix{font-size:13px;line-height:1.45;transition:all 0.2s}.ix.c{color:#b8ae9e;text-decoration:line-through}.ft{text-align:center;font-size:12px;color:#b0a494;margin-top:22px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
<div class="header"><div class="big-icon">👶🏼</div><h1>Checklist<br>Tweede Kindje</h1><p class="sub">Gesorteerd op tijdlijn met deadlines</p></div>
<div class="pc"><div class="pt"><div><span class="pl" id="lb">0 van 0 taken</span><span id="st"></span></div><span class="pp" id="pp">0%</span></div><div class="tr"><div class="fi" id="fi"></div></div><div class="br"><button class="sb s" id="sv" onclick="doSave()">Alles opgeslagen</button><button class="rb" onclick="doReset()">Reset</button></div><p class="dh" id="dh">Je hebt onopgeslagen wijzigingen</p></div>
<div class="tl" id="tl"><div class="tll"></div></div>
<p class="ft">Klik op een fase om taken te bekijken en af te vinken</p>
</div>
<script>
var P=[{t:"Eerste Trimester",i:"🌱",d:"Vóór week 13",c:"#D97B3B",x:["Zwangerschap melden bij verloskundige/gynaecoloog","Zorgverzekering controleren (dekking bevalling, kraamzorg)","NIPT of combinatietest overwegen en inplannen","Budget opstellen voor extra kosten tweede kind","Kinderopvang aanmelden voor tweede kind (wachtlijsten!)","Eerste kind voorbereiden op komst broertje/zusje","Boekjes over grote broer/zus worden lezen"]},{t:"Tweede Trimester",i:"🌿",d:"Vóór week 27",c:"#C49A2A",x:["Kraamzorg aanvragen (liefst vóór week 16!)","20-weken echo inplannen","Zwangerschap melden bij werkgever","Zwangerschapsverlof aanvragen","Partner: geboorteverlof regelen","Keuze ziekenhuis of thuisbevalling bespreken","Kinderopvangtoeslag berekenen en voorbereiden","Testament/voogdijregeling bijwerken","Spaarpotje/rekening openen voor tweede kind","Inventarisatie: wat kan hergebruikt worden?","Geboortekaartjes ontwerpen/bestellen"]},{t:"Derde Trimester",i:"🪺",d:"Vóór week 34",c:"#5E9E5E",x:["Geboorteplan opstellen","Overdracht werkzaamheden voorbereiden","Ouderschapsverlof aanvragen","Bevallingsverlof controleren via werkgever","Aanvullende verzekering baby controleren","Babykamer/slaaphoek inrichten","Wieg of co-sleeper klaarzetten","Autostoeltje groep 0+ controleren","Kinderwagen/buggy checken of aanschaffen","Groot bed voor eerste kind regelen","Oppas/logeerplan eerste kind regelen","Kinderopvang regelen tijdens bevalling"]},{t:"Bijna Zover!",i:"🎒",d:"Vóór week 37",c:"#4A8CB5",x:["Kraampakket bestellen","Ziekenhuistas inpakken","Babykleding sorteren op maat","Luiers, doekjes, verzorgingsproducten inslaan","Borstvoeding/flesvoeding benodigdheden","Aankleedkussen en badspullen checken","Route naar ziekenhuis doorspreken","Noodplan: wie past op eerste kind?","Bellijst/appgroep aanmaken","Beschuit met muisjes inkopen","Traktatie regelen voor kraamvisite","Cadeautje van de baby voor grote broer/zus"]},{t:"Na de Geboorte",i:"✨",d:"Eerste weken",c:"#A85BA5",x:["Geboorteaangifte bij gemeente (binnen 3 werkdagen!)","Baby inschrijven bij zorgverzekeraar (binnen 4 maanden)","Baby aanmelden bij huisarts","Consultatiebureau: eerste afspraak inplannen","BSN-nummer ontvangen en bewaren","Geboortekaartjes versturen","Kinderbijslag controleren"]}];
var K="b2c",ck={},oc=null,dr=false,st=null;
P.forEach(function(p,a){p.x.forEach(function(_,b){ck[a+"x"+b]=false})});
try{var sv=localStorage.getItem(K);if(sv){sv.split(",").forEach(function(k){if(k in ck)ck[k]=true})}}catch(e){}
function fl(m,er){var e=document.getElementById("st");e.className="stb "+(er?"er":"ok");e.textContent=m;if(st)clearTimeout(st);st=setTimeout(function(){e.textContent="";e.className=""},2500)}
function doSave(){try{var v=[];for(var k in ck){if(ck[k])v.push(k)}localStorage.setItem(K,v.join(","));dr=false;fl("Opgeslagen!",false);upd()}catch(e){fl("Fout bij opslaan",true)}}
function doReset(){if(!confirm("Weet je zeker dat je alle vinkjes wilt resetten?"))return;for(var k in ck)ck[k]=false;dr=false;try{localStorage.removeItem(K)}catch(e){}fl("Gereset",false);upd()}
function ti(a,b){var k=a+"x"+b;ck[k]=!ck[k];dr=true;upd()}
function tc(a){oc=oc===a?null:a;upd()}
function upd(){var tot=0,dn=0;for(var k in ck){tot++;if(ck[k])dn++}var pct=Math.round((dn/tot)*100);
document.getElementById("lb").textContent=dn+" van "+tot+" taken";document.getElementById("pp").textContent=pct+"%";document.getElementById("fi").style.width=pct+"%";
var btn=document.getElementById("sv");if(dr){btn.className="sb a";btn.textContent="💾  Wijzigingen opslaan"}else{btn.className="sb s";btn.textContent="✓  Alles opgeslagen"}
document.getElementById("dh").style.display=dr?"block":"none";
var tl=document.getElementById("tl"),h='<div class="tll"></div>';
P.forEach(function(ph,pi){var cd=0;ph.x.forEach(function(_,ii){if(ck[pi+"x"+ii])cd++});var ad=cd===ph.x.length,op=oc===pi,dc=ad?"#8CC084":ph.c;
h+='<div class="ph"><div class="dot" style="background:'+dc+';box-shadow:0 0 0 3px #fff,0 0 0 5px '+dc+'40">'+(ad?"✓":"")+"</div>";
h+='<div class="cd'+(ad?" ad":"")+'" style="border-left-color:'+(ad?"#8CC084":ph.c)+'">';
h+='<button class="ch" onclick="tc('+pi+')"><span class="ci">'+ph.i+'</span><div style="flex:1"><div class="ct">'+ph.t+'</div><div class="cm"><span class="ba" style="background:'+(ad?"#8CC084":ph.c)+'">'+ph.d+'</span><span class="cc">'+cd+"/"+ph.x.length+" afgerond"+(ad?" ✅":"")+"</span></div></div>";
h+='<span class="cv'+(op?" o":"")+'">▾</span></button>';
h+='<div class="its'+(op?" o":"")+'">';
ph.x.forEach(function(txt,ii){var done=ck[pi+"x"+ii];h+='<div class="it" onclick="ti('+pi+","+ii+')"><div class="cb'+(done?" c":"")+'"></div><span class="ix'+(done?" c":"")+'">'+txt+"</span></div>"});
h+="</div></div></div>"});tl.innerHTML=h}
upd();
</script>
</body>
</html>
